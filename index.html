<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TSA Library - Pro Đúng/Sai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #002d5e; --accent: #d32f2f; --bg: #f0f2f5; --success: #22c55e; --blue: #2563eb; --wrong: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100vh; background: var(--bg); overflow: hidden; }
        .hidden { display: none !important; }

        #creator-mode { padding: 20px; overflow-y: auto; height: 100vh; display: flex; flex-direction: column; gap: 20px; }
        .container-input, .library-box { max-width: 1100px; width: 100%; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; resize: vertical; margin-top: 5px; min-height: 150px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }

        header { background: #fff; height: 60px; display: flex; align-items: center; padding: 0 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); justify-content: space-between; }
        #main-countdown { font-size: 18px; color: var(--accent); font-weight: 900; padding: 5px 15px; border: 2px solid var(--accent); border-radius: 8px; }

        .main-container { display: flex; height: calc(100vh - 130px); }
        .reading-pane { width: 50%; background: #fff; padding: 30px; overflow-y: auto; border-right: 2px solid #dee2e6; line-height: 1.8; }
        .questions-pane { width: 50%; background: #f8fafc; padding: 25px; overflow-y: auto; }

        .q-block { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .q-num { font-weight: 900; color: var(--primary); border-bottom: 2px solid var(--accent); margin-bottom: 10px; display: inline-block; }
        
        /* Style cho từng dòng Đúng/Sai */
        .tf-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; background: #fdfdfd; border: 1px solid #eee; }
        .tf-row.review-correct { border-left: 5px solid var(--success); background: #f0fdf4; }
        .tf-row.review-wrong { border-left: 5px solid var(--wrong); background: #fef2f2; }
        .tf-text { flex: 1; padding-right: 15px; font-size: 14px; }
        .tf-btns { display: flex; gap: 5px; }
        .tf-btn { width: 45px; height: 35px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; border-radius: 4px; }
        .tf-btn.active-t { background: var(--success); color: white; border-color: var(--success); }
        .tf-btn.active-f { background: var(--accent); color: white; border-color: var(--accent); }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="creator-mode">
    <div class="container-input">
        <input type="text" id="exam-name" placeholder="Tên đề thi...">
        <div class="grid-layout">
            <div style="background:#f8fafc; padding:15px; border-radius:10px;">
                <strong>NGỮ LIỆU 1</strong>
                <textarea id="text-0" placeholder="Nội dung bài đọc..."></textarea>
                <textarea id="raw-0" placeholder="Câu 1 [Đúng/Sai]: Nội dung...&#10;- Ý 1&#10;- Ý 2&#10;[Key: T, F]"></textarea>
            </div>
            <div style="background:#f8fafc; padding:15px; border-radius:10px;">
                <strong>NGỮ LIỆU 2</strong>
                <textarea id="text-1" placeholder="Nội dung bài đọc..."></textarea>
                <textarea id="raw-1" placeholder="Câu hỏi khác..."></textarea>
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="buildExam()">BẮT ĐẦU THI</button>
    </div>
</div>

<div id="exam-mode" class="hidden">
    <header><div id="main-countdown">30:00</div></header>
    <div class="main-container">
        <div class="reading-pane" id="readingPane"></div>
        <div class="questions-pane" id="questionsPane"></div>
    </div>
    <footer>
        <button class="btn btn-primary" onclick="switchPart(0)">BÀI 1</button>
        <button class="btn btn-primary" onclick="switchPart(1)">BÀI 2</button>
        <button class="btn btn-accent" onclick="submitExam()">NỘP BÀI</button>
    </footer>
</div>

<script>
    let EXAM_DATA = [], userAnswers = {}, currentPart = 0, isLocked = false, showReview = false, mainSecs = 1800;

    function buildExam() {
        EXAM_DATA = [];
        for(let i=0; i<2; i++) {
            const t = document.getElementById(`text-${i}`).value;
            const r = document.getElementById(`raw-${i}`).value;
            let qs = [];
            r.split(/(?=Câu\s+\d+)/g).filter(b => b.trim()).forEach(b => {
                const id = (b.match(/Câu\s+(\d+)/i) || [])[1];
                const key = (b.match(/\[Key:\s*(.*?)\]/i) || [])[1] || "";
                let type = b.toLowerCase().includes("[đúng/sai]") ? 'tf' : 'mcq';
                
                let qObj = { id, type, key: key.toUpperCase(), raw: b.replace(/\[Key:.*?\]/i, "").trim() };
                if(type === 'tf') {
                    // Tách các dòng bắt đầu bằng dấu "-"
                    qObj.rows = qObj.raw.split('\n').filter(l => l.trim().startsWith('-')).map(l => l.replace(/^-/, "").trim());
                    // Lấy tiêu đề câu hỏi (bỏ phần [Đúng/Sai] và các dòng liệt kê)
                    qObj.title = qObj.raw.split('\n')[0].replace(/Câu\s+\d+\s*\[Đúng\/Sai\]:?/i, "").trim();
                }
                if(id) qs.push(qObj);
            });
            EXAM_DATA.push({ text: t, questions: qs });
        }
        document.getElementById('creator-mode').classList.add('hidden');
        document.getElementById('exam-mode').classList.remove('hidden');
        render();
    }

    function render() {
        const data = EXAM_DATA[currentPart];
        document.getElementById('readingPane').innerHTML = `<div style="white-space:pre-line">${data.text}</div>`;
        let h = '';
        data.questions.forEach(q => {
            h += `<div class="q-block"><span class="q-num">CÂU ${q.id}</span>`;
            
            if(q.type === 'tf') {
                h += `<p style="margin-bottom:10px; font-weight:600;">${q.title}</p>`;
                const keys = q.key.split(',').map(s => s.trim());
                
                q.rows.forEach((row, ri) => {
                    const userVal = (userAnswers[q.id] || {})[ri];
                    let rowClass = '';
                    if(showReview) {
                        rowClass = (userVal === keys[ri]) ? 'review-correct' : 'review-wrong';
                    }

                    h += `
                    <div class="tf-row ${rowClass}">
                        <div class="tf-text">${row}</div>
                        <div class="tf-btns">
                            <button class="tf-btn ${userVal==='T'?'active-t':''}" onclick="setTF('${q.id}',${ri},'T')">Đ</button>
                            <button class="tf-btn ${userVal==='F'?'active-f':''}" onclick="setTF('${q.id}',${ri},'S')">S</button>
                        </div>
                    </div>`;
                });
            }
            if(showReview) h += `<div style="margin-top:10px; color:var(--blue); font-weight:bold;">Đáp án: ${q.key}</div>`;
            h += `</div>`;
        });
        document.getElementById('questionsPane').innerHTML = h;
    }

    function setTF(qid, ri, val) {
        if(isLocked) return;
        if(!userAnswers[qid]) userAnswers[qid] = {};
        // Nếu nhấn lại nút cũ thì bỏ chọn (Toggle)
        userAnswers[qid][ri] = (userAnswers[qid][ri] === val) ? null : val;
        render();
    }

    function switchPart(i) { currentPart = i; render(); }
    
    function submitExam() {
        if(confirm("Xóa nộp bài?")) {
            isLocked = true;
            showReview = true;
            render();
        }
    }
</script>
</body>
</html>
